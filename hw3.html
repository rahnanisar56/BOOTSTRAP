<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course progress Dashboard</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
</head>
<body>
    <div class="container">
    <ul class="breadcrumb">
        <li class="breadcrumb-item">Home</li>
        <li class="breadcrumb-item">Courses</li>
        <li class="breadcrumb-item">Web Development</li>
    </ul>
    <h1>Web Development Course <span class="badge badge-primary">New</span></h1><br>
    HTML
    <div class="progress">
        <div class="progress-bar bg-success progress-bar-striped" style="width: 100%;">100%</div>
    </div>
    CSS
    <div class="progress">
        <div class="progress-bar bg-primary progress-bar-striped progress-bar-animated" style="width: 75%;">75%</div>
    </div>
    Javascript
    <div class="progress">
        <div class="progress-bar" style="width: 50%; background-color: orange;">50%</div>
    </div>
    Bootstrap
    <div class="progress">
        <div class="progress-bar bg-danger" style="width: 25%;">25%</div>
    </div><br>
    <div style="text-align: center;">
    <button type="button" class="btn btn-success btn-lg">Start</button>
    <button type="button" class="btn btn-danger btn-lg">Pause</button>
    <button type="button" class="btn btn-warning btn-lg">Reset</button>
    </div><br>
    <ul class="pagination justify-content-center">
        <li class="page-item active"><a class="page-link" href="#">1</a></li>
        <li class="page-item"><a class="page-link" href="#">2</a></li>
        <li class="page-item disabled"><a class="page-link" href="#">3</a></li>

    </ul>
    </div>
</body>
</html>

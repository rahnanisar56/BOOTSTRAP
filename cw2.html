<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile and Grades</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
</head>
<body>
    <div class="container">
    <h1 class="display-1" style="text-align: center; font-family: Verdana, Geneva, Tahoma, sans-serif;">Student Profile</h1>
    <blockquote class="blockquote" style="text-align: center;">Learning never exhausts the mind.</blockquote><br>
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRNNZJU6Pmp5GuBaafSUXIKSPJHn2JaAPi_ZQ&s" class="rounded-circle mx-auto d-block" alt="profile image" width="200px" height="180px"><br>
    <table class="table table-bordered table-striped" style="text-align: center;">
        <thead class="thead-dark">
            <tr>
                <th>Subjects</th>
                <th>Mark Scored</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th>Maths</th>
                <th>85</th>
            </tr>
            <tr>
                <th>English</th>
                <th>95</th>
            </tr>
            <tr>
                <th>Science</th>
                <th>75</th>
            </tr>
        </tbody>
    </table>
    <div class="alert alert-success" style="text-align: center;">Profile updated successfully!</div>
    </div>
</body>
</html>

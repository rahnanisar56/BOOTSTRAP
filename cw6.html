<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
</head>
<body>
    <div class="container">
    <div class="form-group">
        <label for="name">Name:</label>
        <input type="text" class="form-control" id="name" placeholder="Enter Name">
    </div>
    <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" class="form-control" id="email" placeholder="Enter email">
    </div>
    <div class="form-group">
        <label for="feedback">Feedback:</label>
        <textarea class="form-control" rows="3" id="feedback"></textarea>
    </div>
    <div class="form-group">
        <label for="selection">How did you find us:</label>
        <select class="form-control" id="selection">
            <option>Instagram</option>
            <option>Whatsapp</option>
            <option>Friends</option>
        </select>
    </div>
    <p>Are you satisfied with our site:</p>
    <div class="form-check-inline">
        <label class="form-check-label">
        <input type="radio" class="form-check-input" name="optradio">1
        </label>
    </div>
    <div class="form-check-inline">
        <label class="form-check-label">
        <input type="radio" class="form-check-input"name="optradio" >2
    </label>
    </div>
    <div class="form-check-inline">
        <label class="form-check-label">
        <input type="radio" class="form-check-input" name="optradio">3
    </label>
    </div>
    <div class="form-check-inline">
        <label class="form-check-label">
        <input type="radio" class="form-check-input"name="optradio" >4
    </label>
    </div>
    <div class="form-check-inline">
        <label class="form-check-label">
        <input type="radio" class="form-check-input"name="optradio" >5
    </label>
    </div><br><br>
    <button type="submit" class="btn btn-primary">Submit</button>
    </div>
</body>
</html>
